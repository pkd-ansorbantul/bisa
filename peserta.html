<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>PKD GP Ansor Kabupaten Bantul · Data Peserta</title>

  <!-- Favicon & Font Modern -->
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    /* Gaya asli dipertahankan */
    * { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    /* ===== Gaya navbar yang diselaraskan dengan index.html ===== */
    .navbar-brand {
      line-height: 1.2;
    }
    .brand-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #0a3d62;
    }
    .brand-sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6c757d;
      display: block;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    .navbar-brand img {
      height: 45px;
      width: auto;
      margin-right: 12px;
      transition: transform 0.3s ease;
      will-change: transform;
    }
    .navbar-brand img:hover {
      transform: scale(1.05);
    }
    /* ========================================================= */
    body {
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
    }
    .container-card {
      max-width: 1000px;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      margin: 30px auto;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      border: 1px solid rgba(226,232,240,0.6);
    }
    .section-title {
      font-weight: 650;
      font-size: 1.75rem;
      margin-bottom: 1.8rem;
      color: #0f172a;
      border-left: 6px solid #2563eb;
      padding-left: 1.2rem;
    }
    .footer-modern {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 3rem;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #e2e8f0;
      background: white;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .toast {
      background: white;
      border-left: 5px solid;
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
      border-radius: 16px;
    }
    .toast.border-success { border-left-color: #28a745; }
    .toast.border-danger { border-left-color: #dc3545; }
    #utusanLuarContainer {
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>

<!-- Navbar (sama dengan about.html) -->
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor" class="me-2">
      <span>
        <span class="brand-title">PKD GP Ansor</span>
        <span class="brand-sub">Kabupaten Bantul</span>
      </span>
    </a>
    <a href="index.html" class="btn btn-outline-primary rounded-pill px-4 ms-auto">
      <i class="bi bi-arrow-left"></i> Kembali
    </a>
  </div>
</nav>

<!-- Konten utama -->
<div id="contentArea">
  <section id="pesertaSection" class="container container-card">
    <h2 class="section-title"><i class="bi bi-person-badge me-2"></i>Form Data Peserta PKD</h2>
    <div id="pesertaFormContainer">Memuat form...</div>
  </section>
</div>

<!-- Footer -->
<footer class="footer-modern container">
  <div class="d-flex justify-content-center align-items-center gap-2">
    <i class="bi bi-c-circle"></i>
    <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul. Semua Hak Dilindungi</span>
  </div>
</footer>

<!-- Toast notifikasi -->
<div class="toast-container">
  <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
    <div class="toast-header bg-white border-0">
      <i class="bi me-2" id="toastIcon"></i>
      <strong class="me-auto" id="toastTitle">Berhasil</strong>
      <small>baru saja</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toastMessage"></div>
  </div>
</div>

<!-- Bootstrap JS & dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script publik (form peserta) -->
<script>
  // =====================================================
  //   KONFIGURASI & STATE
  // =====================================================
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbzCgdl1FM1Ji4PbTFS3EwMCRqUxTqvwPf_AOrWBRHKyal4MhgUCd5A3xILjqfW7PCpY/exec'; // GANTI DENGAN URL DEPLOY ANDA!

  // =====================================================
  //   FUNGSI BANTU
  // =====================================================
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function showToast(message, type = 'success') {
    const toastEl = document.getElementById('notificationToast');
    const toastMessage = document.getElementById('toastMessage');
    const toastIcon = document.getElementById('toastIcon');
    const toastTitle = document.getElementById('toastTitle');

    toastMessage.innerText = message;

    if (type === 'success') {
      toastEl.classList.add('border-success');
      toastEl.classList.remove('border-danger');
      toastIcon.className = 'bi bi-check-circle-fill me-2 text-success';
      toastTitle.innerText = 'Berhasil';
      toastTitle.style.color = '#28a745';
    } else {
      toastEl.classList.add('border-danger');
      toastEl.classList.remove('border-success');
      toastIcon.className = 'bi bi-x-circle-fill me-2 text-danger';
      toastTitle.innerText = 'Gagal';
      toastTitle.style.color = '#dc3545';
    }

    const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
    toast.show();
  }

  // =====================================================
  //   PANGGILAN APPS SCRIPT (POST saja, GET tidak dipakai)
  // =====================================================
  function callAppsScript(params, method = 'POST') {
    return new Promise((resolve, reject) => {
      if (method === 'GET') {
        // Tidak digunakan, tapi tetap ada untuk kompatibilitas
        reject(new Error('GET not implemented'));
      } else {
        fetch(scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(params)
        })
          .then(() => resolve({ success: true, message: 'Request sent (no-cors)' }))
          .catch(reject);
      }
    });
  }

  // =====================================================
  //   FUNGSI PESERTA (form, preview, submit)
  // =====================================================
  function savePesertaFormState() {
    const form = document.getElementById('formPesertaDinamis');
    if (!form) return;
    const formData = new FormData(form);
    const data = {};
    formData.forEach((v, k) => data[k] = v);
    localStorage.setItem('pesertaFormState', JSON.stringify(data));
  }

  function restorePesertaFormState() {
    const saved = localStorage.getItem('pesertaFormState');
    if (!saved) return;
    try {
      const data = JSON.parse(saved);
      const form = document.getElementById('formPesertaDinamis');
      if (!form) return;
      Object.keys(data).forEach(key => {
        const field = form.querySelector(`[name="${key}"]`);
        if (field) field.value = data[key];
      });
    } catch (e) {}
  }

  function clearPesertaFormState() {
    localStorage.removeItem('pesertaFormState');
  }

  async function loadPesertaForm() {
    const container = document.getElementById('pesertaFormContainer');
    container.innerHTML = 'Memuat form...';

    let html = `
      <form id="formPesertaDinamis">
        <div class="mb-3">
          <label class="form-label fw-bold">📸 Foto</label>
          <input type="file" class="form-control" name="foto" accept="image/*" id="pesertaFotoInput">
          <img id="pesertaFotoPreview" src="#" alt="Preview" style="max-width: 200px; display: none;" class="mt-2 rounded border">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">👤 Nama Lengkap</label>
          <input type="text" class="form-control" name="nama_lengkap" placeholder="Contoh: Ahmad Fauzi" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">📍 Tempat dan Tanggal Lahir</label>
          <input type="text" class="form-control" name="tempat_tgl_lahir" placeholder="Contoh: Bantul, 1 Januari 2000">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">💼 Pekerjaan</label>
          <input type="text" class="form-control" name="pekerjaan" placeholder="Contoh: Mahasiswa / Guru">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">🎓 Pendidikan Terakhir</label>
          <input type="text" class="form-control" name="pendidikan_terakhir" placeholder="Contoh: S1 Manajemen">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">🏠 Alamat</label>
          <textarea class="form-control" name="alamat" rows="2" placeholder="Contoh: Demangan RT 8 Bangunharjo Sewon"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">📞 No HP</label>
          <input type="tel" class="form-control" name="no_hp" placeholder="Contoh: 08123456789">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">📧 Email</label>
          <input type="email" class="form-control" name="email" placeholder="Contoh: ahmad@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">🤝 Utusan (PAC)</label>
          <select class="form-select" name="utusan" required>
            <option value="" disabled selected>-- Pilih Utusan --</option>
            <option value="PAC Bantul">PAC Bantul</option>
            <option value="PAC Banguntapan">PAC Banguntapan</option>
            <option value="PAC Sewon">PAC Sewon</option>
            <option value="PAC Kasihan">PAC Kasihan</option>
            <option value="PAC Pajangan">PAC Pajangan</option>
            <option value="PAC Sedayu">PAC Sedayu</option>
            <option value="PAC Pandak">PAC Pandak</option>
            <option value="PAC Piyungan">PAC Piyungan</option>
            <option value="PAC Pleret">PAC Pleret</option>
            <option value="PAC Jetis">PAC Jetis</option>
            <option value="PAC Imogiri">PAC Imogiri</option>
            <option value="PAC Dlingo">PAC Dlingo</option>
            <option value="PAC Bambanglipuro">PAC Bambanglipuro</option>
            <option value="PAC Sanden">PAC Sanden</option>
            <option value="PAC Kretek">PAC Kretek</option>
            <option value="PAC Pundong">PAC Pundong</option>
            <option value="PAC Srandakan">PAC Srandakan</option>
            <option value="Luar Kabupaten Bantul">Luar Kabupaten Bantul</option>
          </select>
          <div id="utusanLuarContainer" style="display: none; margin-top: 8px;">
            <label class="form-label fw-bold">Tulis Asal (Luar Kab. Bantul)</label>
            <input type="text" class="form-control" name="utusan_luar" placeholder="Contoh: PAC Sleman, Luar DIY, dll">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">📋 Pengalaman Organisasi</label>
          <textarea class="form-control" name="pengalaman_organisasi" rows="3" placeholder="Tuliskan pengalaman organisasi Anda"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">📤 Kirim Data Peserta</button>
      </form>
    `;
    container.innerHTML = html;

    // Preview foto
    document.getElementById('pesertaFotoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          document.getElementById('pesertaFotoPreview').src = ev.target.result;
          document.getElementById('pesertaFotoPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // Restore state
    restorePesertaFormState();

    // Dropdown dinamis
    const utusanSelect = document.querySelector('select[name="utusan"]');
    const luarContainer = document.getElementById('utusanLuarContainer');
    const luarInput = document.querySelector('input[name="utusan_luar"]');

    if (utusanSelect) {
      utusanSelect.addEventListener('change', function() {
        if (this.value === 'Luar Kabupaten Bantul') {
          luarContainer.style.display = 'block';
        } else {
          luarContainer.style.display = 'none';
          if (luarInput) luarInput.value = '';
        }
      });
    }

    // Trigger change untuk restore
    if (utusanSelect) {
      utusanSelect.dispatchEvent(new Event('change'));
    }

    // Auto-save
    document.querySelectorAll('#formPesertaDinamis input, #formPesertaDinamis textarea, #formPesertaDinamis select').forEach(el => {
      const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(eventType, savePesertaFormState);
    });

    // Submit
    document.getElementById('formPesertaDinamis').addEventListener('submit', submitPesertaForm);
  }

  async function submitPesertaForm(e) {
    e.preventDefault();
    const form = document.getElementById('formPesertaDinamis');
    const formData = new FormData(form);
    const data = {};

    const fotoFile = formData.get('foto');
    if (fotoFile && fotoFile.size > 5 * 1024 * 1024) {
      showToast('Ukuran foto maksimal 5 MB', 'danger');
      return;
    }
    if (fotoFile && fotoFile.size > 0) {
      const reader = new FileReader();
      reader.readAsDataURL(fotoFile);
      await new Promise((resolve) => {
        reader.onload = () => {
          data.foto = reader.result;
          resolve();
        };
      });
    }

    formData.forEach((value, key) => {
      if (key !== 'foto') data[key] = value;
    });

    // Gabungkan utusan jika memilih Luar
    if (data.utusan === 'Luar Kabupaten Bantul') {
      const luarValue = data.utusan_luar ? data.utusan_luar.trim() : '';
      if (luarValue) {
        data.utusan = 'Luar Kabupaten Bantul - ' + luarValue;
      } else {
        data.utusan = 'Luar Kabupaten Bantul (tidak diisi)';
      }
    }
    delete data.utusan_luar;

    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Mengirim...';

    try {
      await callAppsScript({ action: 'submitPeserta', ...data }, 'POST');
      showToast('✅ Data peserta berhasil dikirim!', 'success');
      form.reset();
      document.getElementById('pesertaFotoPreview').style.display = 'none';
      clearPesertaFormState();
      document.getElementById('utusanLuarContainer').style.display = 'none';
    } catch (err) {
      showToast('❌ Gagal mengirim: ' + err.message, 'danger');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '📤 Kirim Data Peserta';
    }
  }

  // =====================================================
  //   INISIALISASI
  // =====================================================
  window.onload = function() {
    loadPesertaForm();

    // Tutup navbar otomatis
    document.addEventListener('click', function(event) {
      const navbar = document.getElementById('navbarMain');
      const toggler = document.querySelector('.navbar-toggler');
      if (!navbar || !toggler) return;
      const isClickInside = navbar.contains(event.target) || toggler.contains(event.target);
      if (!isClickInside && navbar.classList.contains('show')) {
        const bsCollapse = bootstrap.Collapse.getInstance(navbar);
        if (bsCollapse) bsCollapse.hide();
      }
    });
  };
</script>
</body>
</html>
