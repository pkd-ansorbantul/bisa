<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Informasi PKD - GP Ansor Bantul</title>
    <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #0f172a; }
        .navbar { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.3); }
        .navbar-brand img { max-height: 40px; margin-right: 12px; }
        .brand-title { font-size: 1.35rem; font-weight: 700; color: #0a3d62; }
        .brand-sub { font-size: 0.9rem; color: #6c757d; display: block; }
        .nav-link { font-weight: 500; border-radius: 9999px; padding: 0.5rem 1.2rem; color: #334155; transition: all 0.15s; }
        .nav-link:hover { background: rgba(37,99,235,0.06); color: #2563eb; }
        .nav-link.active { background: #2563eb; color: white; box-shadow: 0 4px 10px rgba(37,99,235,0.2); }
        .container-card { max-width: 1200px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); }
        .section-title { font-weight: 650; font-size: 1.75rem; border-left: 6px solid #2563eb; padding-left: 1.2rem; margin-bottom: 1.8rem; }

        .flyer-section { position: relative; margin-bottom: 2rem; }
        .flyer-container { display: flex; gap: 1rem; }
        .flyer-card { flex: 0 0 calc(20% - 0.8rem); max-width: calc(20% - 0.8rem); background: white; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; }
        .flyer-card:hover { transform: scale(1.02); }
        .flyer-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 20px 20px 0 0; }
        .flyer-card-body { padding: 1rem; }
        .flyer-nav { position: absolute; top: 50%; transform: translateY(-50%); background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1); z-index: 10; }
        .flyer-nav.left { left: -20px; }
        .flyer-nav.right { right: -20px; }
        .flyer-nav.disabled { opacity: 0.5; pointer-events: none; }

        .timeline-section { margin: 2rem 0; }
        .timeline-track { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; }
        .timeline-node { display: flex; flex-direction: column; align-items: center; cursor: pointer; margin: 0 1rem 1.5rem; position: relative; }
        .timeline-dot { width: 20px; height: 20px; border-radius: 50%; background: #2563eb; border: 3px solid white; box-shadow: 0 0 0 2px #2563eb; }
        .timeline-dot.selesai { background: #16a34a; box-shadow: 0 0 0 2px #16a34a; }
        .timeline-label { margin-top: 0.5rem; font-size: 0.85rem; font-weight: 600; text-align: center; max-width: 140px; }
        .timeline-date { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
        .timeline-location { font-size: 0.7rem; color: #475569; font-style: italic; }
        .connector { height: 2px; background: #cbd5e1; flex: 1; min-width: 20px; }
        .connector.selesai { background: #16a34a; }
        .status-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; margin-top: 3px; }
        .status-badge.selesai { background: #dcfce7; color: #166534; }
        .status-badge.aktif { background: #dbeafe; color: #1e40af; }

        #zoomModal .modal-content { background: transparent; border: none; }
        #zoomModal .modal-header { background: rgba(255,255,255,0.9); border-radius: 1rem 1rem 0 0; }
        #zoomImage { max-height: 80vh; transition: transform 0.2s; cursor: grab; }
        #zoomImage:active { cursor: grabbing; }

        .calendar-section { margin-top: 2rem; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .calendar-nav button { border: none; background: #f1f5f9; border-radius: 8px; padding: 0.3rem 0.8rem; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; text-align: center; }
        .calendar-day-header { font-weight: 600; color: #64748b; font-size: 0.8rem; padding: 0.3rem; }
        .calendar-day { padding: 0.5rem; border-radius: 8px; background: #f8fafc; color: #0f172a; font-size: 0.85rem; cursor: default; }
        .calendar-day.other-month { color: #cbd5e1; }
        .calendar-day.has-event { background: #2563eb; color: white; font-weight: 600; cursor: pointer; }
        .calendar-day.today { border: 2px solid #f59e0b; }
        .calendar-day.highlighted { outline: 3px solid #f59e0b; outline-offset: -2px; background: #fbbf24; color: #0f172a; font-weight: 700; }

        .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: 2rem; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }

        @media (max-width: 992px) { .flyer-card { flex: 0 0 calc(33.333% - 0.67rem); max-width: calc(33.333% - 0.67rem); } }
        @media (max-width: 768px) { .flyer-card { flex: 0 0 80%; max-width: 80%; } .timeline-node { margin: 0 0.5rem 1.5rem; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="LOGO ANSOR.webp" alt="GP Ansor">
                <span><span class="brand-title">PKD GP Ansor</span><span class="brand-sub">Kabupaten Bantul</span></span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="pretest.html"><i class="bi bi-pencil-square"></i>Pre-test</a></li>
                    <li class="nav-item"><a class="nav-link" href="posttest.html"><i class="bi bi-trophy"></i>Post-test</a></li>
                    <li class="nav-item"><a class="nav-link" href="absen.html"><i class="bi bi-qr-code"></i>Absen</a></li>
                    <li class="nav-item"><a class="nav-link" href="skrining.html"><i class="bi bi-clipboard-check"></i>Skrining</a></li>
                    <li class="nav-item"><a class="nav-link" href="peserta.html"><i class="bi bi-person-badge"></i>Peserta</a></li>
                    <li class="nav-item"><a class="nav-link" href="materi.html"><i class="bi bi-file-earmark-pdf"></i>Materi</a></li>
                    <li class="nav-item"><a class="nav-link active" href="informasi.html"><i class="bi bi-info-circle"></i>Informasi</a></li>
                    <li class="nav-item"><a class="nav-link" href="usulan_form.html"><i class="bi bi-envelope-paper"></i>Usulan PKD</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container container-card">
        <h2 class="section-title"><i class="bi bi-calendar-heart me-2"></i>Jadwal & Flyer PKD</h2>
        <div id="infoContainer" class="text-center py-4">
            <!-- akan diisi segera oleh JavaScript -->
        </div>
    </div>

    <!-- Modal Zoom -->
    <div class="modal fade" id="zoomModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header border-0 py-2 px-3">
                    <h5 class="modal-title" id="zoomTitle">Flyer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0 position-relative d-flex align-items-center justify-content-center" style="background: rgba(0,0,0,0.5);">
                    <button class="btn btn-light rounded-circle position-absolute top-50 start-0 translate-middle-y ms-3" id="prevFlyerBtn" style="z-index:10;"><i class="bi bi-chevron-left"></i></button>
                    <div style="overflow:auto; max-height:80vh; display:flex; justify-content:center; align-items:flex-start;">
                        <img id="zoomImage" src="" alt="Flyer">
                    </div>
                    <button class="btn btn-light rounded-circle position-absolute top-50 end-0 translate-middle-y me-3" id="nextFlyerBtn" style="z-index:10;"><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-modern container">
        <div class="d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-c-circle"></i><span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxhkFxLG4RZd4tm3w_4j761hXz0gn4cmQFt-2JO0IEIBS-frohWV_c9CDA1fdM65lee/exec'; // Ganti
        const CACHE_KEY = 'infoListCache';
        const CACHE_TIME_KEY = 'infoListCacheTime';
        const MAX_AGE = 3600000; // 1 jam

        let flyers = [], timelines = [];
        let currentFlyerIndex = 0, currentZoomIndex = 0;
        let zoomScale = 1, translateX = 0, translateY = 0, isDragging = false, startX, startY;
        const maxVisibleFlyers = 5;
        let calendarYear, calendarMonth;

        // --- Cache helpers ---
        function getCachedInfo() {
            try {
                const data = sessionStorage.getItem(CACHE_KEY);
                const time = sessionStorage.getItem(CACHE_TIME_KEY);
                if (data && time && (Date.now() - parseInt(time)) < MAX_AGE) {
                    return JSON.parse(data);
                }
            } catch(e) {}
            return null;
        }

        function saveCachedInfo(data) {
            try {
                sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
                sessionStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
            } catch(e) {}
        }

        async function fetchData(forceRefresh = false) {
            if (!forceRefresh) {
                const cached = getCachedInfo();
                if (cached) {
                    // 1. Render langsung dari cache
                    processData(cached);
                    // 2. Background update
                    fetchData(true).catch(console.warn);
                    return;
                }
            }

            // 3. Tidak ada cache atau force refresh – ambil dari server
            try {
                const res = await fetch(`${scriptUrl}?action=getInfoList`, { mode: 'cors' });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                const newData = data.data || [];

                // Bandingkan dengan cache (jika ada) – jika berbeda, update
                const cached = getCachedInfo();
                const cachedStr = cached ? JSON.stringify(cached) : null;
                const newStr = JSON.stringify(newData);

                if (!cached || cachedStr !== newStr) {
                    saveCachedInfo(newData);
                    processData(newData);
                } else if (forceRefresh) {
                    // Data sama, render ulang hanya jika ini force refresh (misal dari klik refresh manual)
                    processData(newData);
                }
            } catch(e) {
                document.getElementById('infoContainer').innerHTML = `<div class="alert alert-danger">Gagal memuat data: ${e.message}</div>`;
            }
        }

        function processData(all) {
            flyers = all.filter(i => i.jenis === 'flyer').sort((a,b) => (a.urutan||0)-(b.urutan||0));
            timelines = all.filter(i => i.jenis === 'timeline').sort((a,b) => new Date(a.tanggal_mulai) - new Date(b.tanggal_mulai));
            
            // Reset slider index jika data berubah total (opsional)
            if (currentFlyerIndex > flyers.length - maxVisibleFlyers) {
                currentFlyerIndex = Math.max(0, flyers.length - maxVisibleFlyers);
            }
            
            renderAll();
        }

        function renderAll() {
            const container = document.getElementById('infoContainer');
            if (!flyers.length && !timelines.length) {
                container.innerHTML = '<p class="text-muted">Belum ada informasi.</p>';
                return;
            }
            let html = '';

            if (flyers.length > 0) {
                const end = Math.min(currentFlyerIndex + maxVisibleFlyers, flyers.length);
                html += `<div class="flyer-section"><h4 class="mb-3 fw-bold"><i class="bi bi-image me-2"></i>Flyer Kegiatan</h4>
                    <div class="d-flex align-items-center position-relative">
                        <div class="flyer-nav left ${currentFlyerIndex === 0 ? 'disabled' : ''}" onclick="slideFlyers(-${maxVisibleFlyers})"><i class="bi bi-chevron-left"></i></div>
                        <div class="flex-grow-1" style="overflow:hidden;"><div class="flyer-container">`;
                for (let i = currentFlyerIndex; i < end; i++) {
                    const f = flyers[i];
                    const thumbUrl = f.url ? `https://lh3.googleusercontent.com/d/${f.url}=w400` : null;
                    const isSelesai = f.status === 'selesai';
                    html += `<div class="flyer-card" data-index="${i}" onclick="zoomFlyer(${i})">
                        ${thumbUrl ? `<img src="${thumbUrl}" alt="${escapeHtml(f.judul)}" loading="lazy">` : `<div class="bg-light text-center py-5"><i class="bi bi-image" style="font-size:3rem;"></i></div>`}
                        <div class="flyer-card-body"><h5 class="small mb-1">${escapeHtml(f.judul)}</h5><span class="status-badge ${isSelesai ? 'selesai' : 'aktif'}">${isSelesai ? 'Selesai' : 'Aktif'}</span></div>
                    </div>`;
                }
                html += `</div></div><div class="flyer-nav right ${end >= flyers.length ? 'disabled' : ''}" onclick="slideFlyers(${maxVisibleFlyers})"><i class="bi bi-chevron-right"></i></div></div></div>`;
            }

            if (timelines.length > 0) {
                html += `<div class="timeline-section"><h4 class="mb-3 fw-bold"><i class="bi bi-calendar-week me-2"></i>Timeline Pelaksanaan</h4><div class="timeline-track">`;
                timelines.forEach((t, idx) => {
                    const tglMulai = t.tanggal_mulai ? new Date(t.tanggal_mulai).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) : '';
                    const tglAkhir = t.tanggal_akhir ? new Date(t.tanggal_akhir).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) : '';
                    const displayTanggal = tglMulai ? (tglAkhir ? `${tglMulai} - ${tglAkhir}` : tglMulai) : '';
                    const isSelesai = t.status === 'selesai';
                    html += `<div class="timeline-node" data-title="${t.judul.toLowerCase()}" onclick="handleTimelineClick('${t.judul.toLowerCase()}')">
                        <div class="timeline-dot ${isSelesai ? 'selesai' : ''}"></div>
                        <div class="timeline-label">${escapeHtml(t.judul)}</div>
                        ${displayTanggal ? `<div class="timeline-date"><i class="bi bi-calendar-event me-1"></i>${displayTanggal}</div>` : ''}
                        ${t.lokasi ? `<div class="timeline-location"><i class="bi bi-geo-alt me-0"></i>${escapeHtml(t.lokasi)}</div>` : ''}
                        <span class="status-badge ${isSelesai ? 'selesai' : 'aktif'}">${isSelesai ? 'Selesai' : 'Aktif'}</span>
                    </div>`;
                    if (idx < timelines.length - 1) {
                        const nextSelesai = timelines[idx+1].status === 'selesai';
                        html += `<div class="connector ${nextSelesai ? 'selesai' : ''}"></div>`;
                    }
                });
                html += `</div></div>`;
            }

            // Kalender
            html += `<div class="calendar-section"><h4 class="mb-3 fw-bold"><i class="bi bi-calendar3 me-2"></i>Kalender Kegiatan</h4>
                <div class="calendar-nav"><button id="prevMonthBtn"><i class="bi bi-chevron-left"></i></button><span id="calendarMonthLabel" class="fw-bold"></span><button id="nextMonthBtn"><i class="bi bi-chevron-right"></i></button></div>
                <div class="calendar-grid" id="calendarGrid"></div></div>`;

            container.innerHTML = html;

            const today = new Date();
            calendarYear = today.getFullYear(); calendarMonth = today.getMonth();
            renderCalendar();
            document.getElementById('prevMonthBtn').addEventListener('click', () => { calendarMonth--; if(calendarMonth<0){calendarMonth=11;calendarYear--;} renderCalendar(); });
            document.getElementById('nextMonthBtn').addEventListener('click', () => { calendarMonth++; if(calendarMonth>11){calendarMonth=0;calendarYear++;} renderCalendar(); });
        }

        function renderCalendar() {
            const year = calendarYear, month = calendarMonth;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            document.getElementById('calendarMonthLabel').innerText = `${monthNames[month]} ${year}`;
            const dayHeaders = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
            let gridHtml = dayHeaders.map(d => `<div class="calendar-day-header">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) gridHtml += `<div class="calendar-day other-month"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = date.toISOString().split('T')[0];
                let isEvent = timelines.some(t => {
                    if (!t.tanggal_mulai) return false;
                    const start = new Date(t.tanggal_mulai);
                    const end = t.tanggal_akhir ? new Date(t.tanggal_akhir) : start;
                    return date >= start && date <= end;
                });
                let classes = 'calendar-day' + (isEvent ? ' has-event' : '');
                if (date.toDateString() === new Date().toDateString()) classes += ' today';
                gridHtml += `<div class="${classes}" data-date="${dateStr}">${day}</div>`;
            }
            document.getElementById('calendarGrid').innerHTML = gridHtml;
            document.querySelectorAll('.calendar-day.has-event').forEach(el => {
                el.addEventListener('click', () => {
                    const d = new Date(el.dataset.date);
                    const match = timelines.find(t => {
                        if (!t.tanggal_mulai) return false;
                        const s = new Date(t.tanggal_mulai);
                        const e = t.tanggal_akhir ? new Date(t.tanggal_akhir) : s;
                        return d >= s && d <= e;
                    });
                    if (match) {
                        highlightFlyer(match.judul.toLowerCase());
                        document.querySelector(`.timeline-node[data-title="${match.judul.toLowerCase()}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });
            });
        }

        function slideFlyers(step) { currentFlyerIndex = Math.max(0, Math.min(currentFlyerIndex + step, flyers.length - maxVisibleFlyers)); renderAll(); }

        function handleTimelineClick(titleLower) {
            highlightFlyer(titleLower);
            const timeline = timelines.find(t => t.judul.toLowerCase() === titleLower);
            if (timeline && timeline.tanggal_mulai) {
                const d = new Date(timeline.tanggal_mulai);
                calendarYear = d.getFullYear();
                calendarMonth = d.getMonth();
                renderCalendar();
                setTimeout(() => {
                    const targetDate = d.toISOString().split('T')[0];
                    const dayEl = document.querySelector(`.calendar-day[data-date="${targetDate}"]`);
                    if (dayEl) {
                        document.querySelectorAll('.calendar-day.highlighted').forEach(el => el.classList.remove('highlighted'));
                        dayEl.classList.add('highlighted');
                        dayEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 50);
            }
        }

        function highlightFlyer(titleLower) {
            const idx = flyers.findIndex(f => f.judul.toLowerCase() === titleLower);
            if (idx !== -1) currentFlyerIndex = Math.max(0, Math.min(idx, flyers.length - maxVisibleFlyers));
            renderAll();
            setTimeout(() => {
                document.querySelector(`.flyer-card[data-index="${idx}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // Zoom functions (sama seperti sebelumnya)
        function zoomFlyer(index) { currentZoomIndex = index; updateZoomImage(); new bootstrap.Modal(document.getElementById('zoomModal')).show(); }
        function updateZoomImage() {
            const f = flyers[currentZoomIndex];
            if (!f) return;
            document.getElementById('zoomImage').src = f.url ? `https://lh3.googleusercontent.com/d/${f.url}` : '';
            document.getElementById('zoomTitle').innerText = f.judul || 'Flyer';
            zoomScale = 1; translateX = 0; translateY = 0;
            document.getElementById('zoomImage').style.transform = 'translate(0px, 0px) scale(1)';
        }
        document.getElementById('prevFlyerBtn').addEventListener('click', () => { if (currentZoomIndex > 0) { currentZoomIndex--; updateZoomImage(); } });
        document.getElementById('nextFlyerBtn').addEventListener('click', () => { if (currentZoomIndex < flyers.length - 1) { currentZoomIndex++; updateZoomImage(); } });
        document.getElementById('zoomImage').addEventListener('wheel', (e) => {
            e.preventDefault();
            zoomScale = Math.min(Math.max(0.5, zoomScale + (e.deltaY > 0 ? -0.1 : 0.1)), 5);
            document.getElementById('zoomImage').style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoomScale})`;
        });
        document.getElementById('zoomImage').addEventListener('mousedown', (e) => {
            e.preventDefault(); isDragging = true; startX = e.clientX - translateX; startY = e.clientY - translateY; e.target.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX; translateY = e.clientY - startY;
            document.getElementById('zoomImage').style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoomScale})`;
        });
        window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; document.getElementById('zoomImage').style.cursor = 'grab'; } });
        document.getElementById('zoomModal').addEventListener('hidden.bs.modal', () => {
            zoomScale = 1; translateX = 0; translateY = 0;
            document.getElementById('zoomImage').style.transform = 'translate(0px, 0px) scale(1)';
        });
        function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }

        // ======= INIT: Cache First, Background Update =======
        window.addEventListener('DOMContentLoaded', () => {
            fetchData(); // akan pakai cache jika ada, lalu background update
        });
    </script>
</body>
