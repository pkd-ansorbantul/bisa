<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Informasi PKD GP Ansor Bantul</title>
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .navbar-brand {
      line-height: 1.2;
    }
    .brand-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #0a3d62;
    }
    .brand-sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6c757d;
      display: block;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    .navbar-brand img {
      height: 45px;
      width: auto;
      margin-right: 12px;
      transition: transform 0.3s ease;
      will-change: transform;
    }
    .navbar-brand img:hover {
      transform: scale(1.05);
    }
    .container-card { 
      max-width: 1200px; 
      background: white; 
      border-radius: 32px; 
      padding: 2rem; 
      margin: 30px auto; 
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
    }
    .section-title { 
      font-weight: 650; 
      font-size: 1.75rem; 
      border-left: 6px solid #2563eb; 
      padding-left: 1.2rem; 
    }
    /* slider horizontal styles */
    .slider-container {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-wrapper {
      overflow-x: hidden;
      scroll-behavior: smooth;
      flex: 1;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .slider-wrapper::-webkit-scrollbar {
      display: none;
    }
    .slider-track {
      display: flex;
      gap: 16px;
    }
    .slider-item {
      flex: 0 0 auto;
    }
    .galeri-item {
      width: 200px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      background: white;
    }
    .galeri-item:hover {
      transform: scale(1.02);
    }
    .galeri-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      cursor: pointer;
      border-radius: 16px 16px 0 0;
    }
    .video-item {
      width: 300px;
    }
    .video-item .card {
      width: 100%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border: none;
      border-radius: 16px;
      overflow: hidden;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      background: #000;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .slider-btn {
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      z-index: 2;
      transition: all 0.2s;
    }
    .slider-btn:hover:not(:disabled) {
      background: #f8f9fa;
      transform: scale(1.05);
    }
    .slider-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    /* timeline styles */
    .timeline-item { 
      position: relative;
      padding-left: 30px;
      margin-bottom: 25px;
      border-left: 2px solid #e2e8f0;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -9px;
      top: 8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2563eb;
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      z-index: 1;
    }
    .timeline-item:last-child {
      border-left: 2px solid transparent;
    }
    .timeline-item .timeline-date {
      display: inline-block;
      background: #eef2ff;
      color: #2563eb;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .timeline-item h6 {
      font-weight: 700;
      margin-bottom: 4px;
      color: #0f172a;
    }
    .timeline-item p {
      margin-bottom: 4px;
      color: #334155;
    }
    /* flyer carousel */
    #flyerCarousel {
      max-width: 900px;
      margin: 0 auto;
    }
    .carousel-item img {
      max-height: 500px;
      object-fit: contain;
      background-color: #f8fafc;
      cursor: pointer;
    }
    .carousel-caption {
      background: rgba(0,0,0,0.6);
      border-radius: 30px;
      padding: 8px 16px;
      bottom: 20px;
    }
    .footer-modern { 
      font-size: 0.85rem; 
      color: #64748b; 
      margin-top: 3rem; 
      text-align: center; 
      padding: 1.5rem 0; 
      border-top: 1px solid #e2e8f0; 
      background: white; 
    }
    .error-message { 
      color: #dc2626; 
      font-size: 0.9rem; 
      margin-top: 0.5rem; 
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor" class="me-2">
      <span>
        <span class="brand-title">PKD GP Ansor</span>
        <span class="brand-sub">Kabupaten Bantul</span>
      </span>
    </a>
    <a href="index.html" class="btn btn-outline-primary rounded-pill px-4 ms-auto">
      <i class="bi bi-arrow-left"></i> Kembali
    </a>
  </div>
</nav>

<!-- Konten utama -->
<div class="container container-card">
  <h2 class="section-title mb-4"><i class="bi bi-info-circle me-2"></i>Informasi PKD</h2>
  
  <!-- FLYER (Carousel jika lebih dari satu) -->
  <div id="flyerSection" class="mb-5 text-center"></div>

  <!-- GALERI dengan slider horizontal -->
  <div id="galeriSection" class="mb-5">
    <h4 class="fw-bold mb-3">📸 Galeri Kegiatan</h4>
    <!-- Slider container (awalnya tersembunyi) -->
    <div class="slider-container" id="galeriSliderContainer" style="display: none;">
      <button class="slider-btn prev" id="galeriPrev" disabled><i class="bi bi-chevron-left"></i></button>
      <div class="slider-wrapper" id="galeriWrapper">
        <div class="slider-track" id="galeriTrack"></div>
      </div>
      <button class="slider-btn next" id="galeriNext"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="galeriEmptyMessage" class="text-muted">Belum ada foto galeri.</div>
  </div>

  <!-- VIDEO dengan slider horizontal -->
  <div id="videoSection" class="mb-5">
    <h4 class="fw-bold mb-3">🎥 Video Terkait</h4>
    <div class="slider-container" id="videoSliderContainer" style="display: none;">
      <button class="slider-btn prev" id="videoPrev" disabled><i class="bi bi-chevron-left"></i></button>
      <div class="slider-wrapper" id="videoWrapper">
        <div class="slider-track" id="videoTrack"></div>
      </div>
      <button class="slider-btn next" id="videoNext"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="videoEmptyMessage" class="text-muted">Belum ada video.</div>
  </div>

  <!-- TIMELINE (tetap vertikal) -->
  <div id="timelineSection">
    <h4 class="fw-bold mb-3">📅 Timeline Pelaksanaan</h4>
    <div id="timelineList"></div>
  </div>
</div>

<!-- Footer -->
<footer class="footer-modern container">
  <div class="d-flex justify-content-center align-items-center gap-2">
    <i class="bi bi-c-circle"></i>
    <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // =====================================================
  //   KONFIGURASI & FUNGSI
  // =====================================================
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbw9SOqv7cUwaASY63dDAR2uGSDvEVMDOeH2WKEOpGYBsfvn2mS_kuk9Nwn-iXqXIkOa/exec'; // GANTI DENGAN URL ANDA

  async function callAppsScript(params) {
    const query = new URLSearchParams(params).toString();
    const res = await fetch(`${scriptUrl}?${query}`, { method: 'GET' });
    return await res.json();
  }

  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return String(unsafe).replace(/[&<>"]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      if (m === '"') return '&quot;';
      return m;
    });
  }

  function getDriveImageUrl(fileId) {
    if (!fileId) return '';
    return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
  }

  function getYouTubeEmbedUrl(url) {
    if (!url) return null;
    
    url = url.trim();
    
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
      /^([a-zA-Z0-9_-]{11})$/
    ];
    
    for (let pattern of patterns) {
      const match = url.match(pattern);
      if (match && match[1]) {
        const videoId = match[1];
        if (videoId.length === 11) {
          return `https://www.youtube.com/embed/${videoId}`;
        }
      }
    }
    
    try {
      const urlObj = new URL(url);
      if (urlObj.hostname.includes('youtube.com') || urlObj.hostname.includes('youtu.be')) {
        let videoId = null;
        if (urlObj.hostname === 'youtu.be') {
          videoId = urlObj.pathname.slice(1);
        } else if (urlObj.pathname === '/watch') {
          videoId = urlObj.searchParams.get('v');
        } else if (urlObj.pathname.startsWith('/embed/')) {
          videoId = urlObj.pathname.split('/')[2];
        } else if (urlObj.pathname.startsWith('/v/')) {
          videoId = urlObj.pathname.split('/')[2];
        }
        if (videoId && videoId.length === 11) {
          return `https://www.youtube.com/embed/${videoId}`;
        }
      }
    } catch (e) {
      // URL tidak valid
    }
    
    console.warn('Gagal mengekstrak YouTube ID dari:', url);
    return null;
  }

  // Fungsi untuk menginisialisasi slider horizontal
  function setupSlider(wrapperId, trackId, prevId, nextId, itemWidth) {
    const wrapper = document.getElementById(wrapperId);
    const track = document.getElementById(trackId);
    const prevBtn = document.getElementById(prevId);
    const nextBtn = document.getElementById(nextId);
    if (!wrapper || !track || !prevBtn || !nextBtn) return;

    const gap = 16; // harus sama dengan CSS gap

    function updateButtons() {
      const maxScroll = track.scrollWidth - wrapper.clientWidth;
      prevBtn.disabled = wrapper.scrollLeft <= 0;
      nextBtn.disabled = wrapper.scrollLeft >= maxScroll - 1; // toleransi 1px
    }

    wrapper.addEventListener('scroll', updateButtons);
    window.addEventListener('resize', updateButtons);

    prevBtn.addEventListener('click', () => {
      wrapper.scrollBy({ left: - (itemWidth + gap), behavior: 'smooth' });
    });

    nextBtn.addEventListener('click', () => {
      wrapper.scrollBy({ left: itemWidth + gap, behavior: 'smooth' });
    });

    // initial update
    updateButtons();
  }

  window.onload = async function() {
    try {
      const res = await callAppsScript({ action: 'getInfoList' });
      if (!res.success) {
        throw new Error(res.error || 'Gagal memuat data');
      }
      const items = res.data || [];

      // ========== FLYER (dengan carousel jika lebih dari satu) ==========
      const flyerItems = items.filter(i => i.jenis === 'flyer').sort((a,b) => (a.urutan||0)-(b.urutan||0));
      const flyerDiv = document.getElementById('flyerSection');
      
      if (flyerItems.length > 1) {
        let carouselHtml = `
          <div id="flyerCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
        `;
        flyerItems.forEach((item, index) => {
          carouselHtml += `<button type="button" data-bs-target="#flyerCarousel" data-bs-slide-to="${index}" class="${index === 0 ? 'active' : ''}" aria-current="${index === 0 ? 'true' : 'false'}" aria-label="Slide ${index+1}"></button>`;
        });
        carouselHtml += `</div><div class="carousel-inner">`;
        flyerItems.forEach((item, index) => {
          const imgUrl = getDriveImageUrl(item.url);
          carouselHtml += `
            <div class="carousel-item ${index === 0 ? 'active' : ''}">
              <img src="${imgUrl}" class="d-block w-100" alt="${escapeHtml(item.judul)}" onclick="window.open('${imgUrl.replace('=w400','')}', '_blank')">
              <div class="carousel-caption d-none d-md-block">
                <h5>${escapeHtml(item.judul)}</h5>
                <p>${escapeHtml(item.deskripsi)}</p>
              </div>
            </div>
          `;
        });
        carouselHtml += `
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#flyerCarousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#flyerCarousel" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        `;
        flyerDiv.innerHTML = carouselHtml;
      } else if (flyerItems.length === 1) {
        const flyer = flyerItems[0];
        flyerDiv.innerHTML = `<img src="${getDriveImageUrl(flyer.url)}" class="img-fluid rounded shadow" alt="Flyer" style="max-height: 500px;" onclick="window.open('${getDriveImageUrl(flyer.url).replace('=w400','')}', '_blank')">`;
      } else {
        flyerDiv.innerHTML = '<p class="text-muted">Belum ada flyer.</p>';
      }

      // ========== GALERI ==========
      const galeri = items.filter(i => i.jenis === 'galeri').sort((a,b) => (a.urutan||0)-(b.urutan||0));
      const galeriTrack = document.getElementById('galeriTrack');
      const galeriSliderContainer = document.getElementById('galeriSliderContainer');
      const galeriEmptyMessage = document.getElementById('galeriEmptyMessage');

      if (galeri.length) {
        galeriSliderContainer.style.display = 'flex';
        galeriEmptyMessage.style.display = 'none';
        galeriTrack.innerHTML = galeri.map(g => `
          <div class="slider-item galeri-item">
            <img src="${getDriveImageUrl(g.url)}" alt="${escapeHtml(g.judul)}" onclick="window.open('${getDriveImageUrl(g.url).replace('=w400','')}', '_blank')">
            <div class="p-2"><small>${escapeHtml(g.judul)}</small></div>
          </div>
        `).join('');
        // Inisialisasi slider dengan lebar item 200px
        setupSlider('galeriWrapper', 'galeriTrack', 'galeriPrev', 'galeriNext', 200);
      } else {
        galeriSliderContainer.style.display = 'none';
        galeriEmptyMessage.style.display = 'block';
      }

      // ========== VIDEO ==========
      const videos = items.filter(i => i.jenis === 'video').sort((a,b) => (a.urutan||0)-(b.urutan||0));
      const videoTrack = document.getElementById('videoTrack');
      const videoSliderContainer = document.getElementById('videoSliderContainer');
      const videoEmptyMessage = document.getElementById('videoEmptyMessage');

      if (videos.length) {
        videoSliderContainer.style.display = 'flex';
        videoEmptyMessage.style.display = 'none';
        videoTrack.innerHTML = videos.map(v => {
          const embedUrl = getYouTubeEmbedUrl(v.url);
          return `
            <div class="slider-item video-item">
              <div class="card h-100 shadow-sm">
                <div class="video-wrapper">
                  ${embedUrl ? `<iframe src="${embedUrl}" allowfullscreen title="${escapeHtml(v.judul)}"></iframe>` : '<div class="d-flex align-items-center justify-content-center h-100 bg-light text-danger">URL tidak valid</div>'}
                </div>
                <div class="card-body">
                  <h6 class="card-title">${escapeHtml(v.judul)}</h6>
                  <p class="card-text small">${escapeHtml(v.deskripsi)}</p>
                </div>
              </div>
            </div>
          `;
        }).join('');
        // Inisialisasi slider dengan lebar item 300px
        setupSlider('videoWrapper', 'videoTrack', 'videoPrev', 'videoNext', 300);
      } else {
        videoSliderContainer.style.display = 'none';
        videoEmptyMessage.style.display = 'block';
      }

      // ========== TIMELINE ==========
      const timeline = items.filter(i => i.jenis === 'timeline').sort((a,b) => (a.urutan||0)-(b.urutan||0));
      const timelineList = document.getElementById('timelineList');
      if (timeline.length) {
        timelineList.innerHTML = timeline.map(t => {
          let tanggal = '';
          if (t.url) {
            const d = new Date(t.url);
            if (!isNaN(d.getTime())) {
              tanggal = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            } else {
              tanggal = t.url;
            }
          }
          return `
            <div class="timeline-item">
              ${tanggal ? `<span class="timeline-date"><i class="bi bi-calendar-event me-1"></i>${escapeHtml(tanggal)}</span>` : ''}
              <h6 class="fw-bold">${escapeHtml(t.judul)}</h6>
              <p class="mb-1">${escapeHtml(t.deskripsi)}</p>
            </div>
          `;
        }).join('');
      } else {
        timelineList.innerHTML = '<p class="text-muted">Belum ada timeline.</p>';
      }

    } catch (e) {
      console.error(e);
      document.querySelector('.container-card').innerHTML += `
        <div class="alert alert-danger mt-3">
          <i class="bi bi-exclamation-triangle"></i> Gagal memuat informasi: ${escapeHtml(e.message)}
        </div>
      `;
    }
  };
</script>
</body>
</html>
