<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Informasi PKD GP Ansor Bantul</title>
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    /* ===== Gaya navbar yang diselaraskan dengan index.html ===== */
    .navbar-brand {
      line-height: 1.2;
    }
    .brand-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #0a3d62;
    }
    .brand-sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6c757d;
      display: block;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    .navbar-brand img {
      height: 45px;
      width: auto;
      margin-right: 12px;
      transition: transform 0.3s ease;
      will-change: transform;
    }
    .navbar-brand img:hover {
      transform: scale(1.05);
    }
    /* ========================================================= */
    .container-card { max-width: 1200px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    .section-title { font-weight: 650; font-size: 1.75rem; border-left: 6px solid #2563eb; padding-left: 1.2rem; }
    .galeri-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .galeri-item { border-radius: 16px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .galeri-item:hover { transform: scale(1.02); }
    .galeri-item img { width: 100%; height: 180px; object-fit: cover; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .timeline-item { border-left: 3px solid #2563eb; padding-left: 20px; margin-bottom: 20px; position: relative; }
    .timeline-item::before { content: ''; position: absolute; left: -8px; top: 0; width: 16px; height: 16px; background: #2563eb; border-radius: 50%; }
    .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: 3rem; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }
  </style>
</head>
<body>

<!-- Navbar (sama dengan about.html) -->
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor" class="me-2">
      <span>
        <span class="brand-title">PKD GP Ansor</span>
        <span class="brand-sub">Kabupaten Bantul</span>
      </span>
    </a>
    <a href="index.html" class="btn btn-outline-primary rounded-pill px-4 ms-auto">
      <i class="bi bi-arrow-left"></i> Kembali
    </a>
  </div>
</nav>

<!-- Konten utama -->
<div class="container container-card">
  <h2 class="section-title mb-4"><i class="bi bi-info-circle me-2"></i>Informasi PKD</h2>
  
  <!-- FLYER -->
  <div id="flyerSection" class="mb-5 text-center"></div>

  <!-- GALERI -->
  <div id="galeriSection" class="mb-5">
    <h4 class="fw-bold mb-3">📸 Galeri Kegiatan</h4>
    <div class="galeri-grid" id="galeriGrid"></div>
  </div>

  <!-- VIDEO -->
  <div id="videoSection" class="mb-5">
    <h4 class="fw-bold mb-3">🎥 Video Terkait</h4>
    <div class="row g-4" id="videoList"></div>
  </div>

  <!-- TIMELINE -->
  <div id="timelineSection">
    <h4 class="fw-bold mb-3">📅 Timeline Pelaksanaan</h4>
    <div id="timelineList"></div>
  </div>
</div>

<!-- Footer -->
<footer class="footer-modern container">
  <div class="d-flex justify-content-center align-items-center gap-2">
    <i class="bi bi-c-circle"></i>
    <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // =====================================================
  //   KONFIGURASI & FUNGSI (SAMA SEPERTI ASLI)
  // =====================================================
  const scriptUrl = 'https://script.google.com/macros/s/AKfycby1BmHq5n77oLoW9r5xhY7b9H6Lvcoi5Jz79hqcbrnO0Y4VidFNmugVFSjcGyJ5f8If/exec'; // GANTI DENGAN URL ANDA

  async function callAppsScript(params) {
    const query = new URLSearchParams(params).toString();
    const res = await fetch(`${scriptUrl}?${query}`, { method: 'GET' });
    return await res.json();
  }

  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return String(unsafe).replace(/[&<>"]/g, function(m) {
      if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;';
      return m;
    });
  }

  function getDriveImageUrl(fileId) {
    return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
  }

  function getYouTubeEmbedUrl(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? 'https://www.youtube.com/embed/' + match[2] : null;
  }

  window.onload = async function() {
    try {
      const res = await callAppsScript({ action: 'getInfoList' });
      const items = res.data || [];

      // Flyer
      const flyer = items.filter(i => i.jenis === 'flyer').sort((a,b) => (a.urutan||0)-(b.urutan||0))[0];
      const flyerDiv = document.getElementById('flyerSection');
      if (flyer && flyer.url) {
        flyerDiv.innerHTML = `<img src="${getDriveImageUrl(flyer.url)}" class="img-fluid rounded shadow" alt="Flyer" style="max-height: 500px;">`;
      } else {
        flyerDiv.innerHTML = '<p class="text-muted">Belum ada flyer.</p>';
      }

      // Galeri
      const galeri = items.filter(i => i.jenis === 'galeri').sort((a,b) => (a.urutan||0)-(b.urutan||0));
      const galeriGrid = document.getElementById('galeriGrid');
      if (galeri.length) {
        galeriGrid.innerHTML = galeri.map(g => `
          <div class="galeri-item">
            <img src="${getDriveImageUrl(g.url)}" alt="${escapeHtml(g.judul)}" onclick="window.open('${getDriveImageUrl(g.url).replace('=w400','')}', '_blank')">
            <div class="p-2"><small>${escapeHtml(g.judul)}</small></div>
          </div>
        `).join('');
      } else {
        galeriGrid.innerHTML = '<p class="text-muted">Belum ada foto galeri.</p>';
      }

      // Video
      const videos = items.filter(i => i.jenis === 'video').sort((a,b) => (a.urutan||0)-(b.urutan||0));
      const videoList = document.getElementById('videoList');
      if (videos.length) {
        videoList.innerHTML = videos.map(v => {
          const embed = getYouTubeEmbedUrl(v.url);
          return `
            <div class="col-md-6">
              <div class="card h-100 shadow-sm">
                <div class="video-wrapper">
                  ${embed ? `<iframe src="${embed}" allowfullscreen></iframe>` : '<p class="text-danger">URL tidak valid</p>'}
                </div>
                <div class="card-body">
                  <h6 class="card-title">${escapeHtml(v.judul)}</h6>
                  <p class="card-text small">${escapeHtml(v.deskripsi)}</p>
                </div>
              </div>
            </div>
          `;
        }).join('');
      } else {
        videoList.innerHTML = '<p class="text-muted">Belum ada video.</p>';
      }

      // Timeline
      const timeline = items.filter(i => i.jenis === 'timeline').sort((a,b) => (a.urutan||0)-(b.urutan||0));
      const timelineList = document.getElementById('timelineList');
      if (timeline.length) {
        timelineList.innerHTML = timeline.map(t => `
          <div class="timeline-item">
            <h6 class="fw-bold">${escapeHtml(t.judul)}</h6>
            <p class="mb-1">${escapeHtml(t.deskripsi)}</p>
            <small class="text-muted">${t.url ? new Date(t.url).toLocaleDateString('id-ID') : ''}</small>
          </div>
        `).join('');
      } else {
        timelineList.innerHTML = '<p class="text-muted">Belum ada timeline.</p>';
      }

    } catch (e) {
      console.error(e);
      alert('Gagal memuat informasi.');
    }
  };
</script>
</body>
</html>
