  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* Gaya dasar */
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    .navbar { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.3); }
    .navbar-brand img { max-height: 40px; margin-right: 12px; }
    .brand-title { font-size: 1.35rem; font-weight: 700; color: #0a3d62; }
    .brand-sub { font-size: 0.9rem; color: #6c757d; display: block; }
    .nav-link { font-weight: 500; border-radius: 9999px; padding: 0.5rem 1.2rem; color: #334155; transition: all 0.15s; }
    .nav-link:hover { background: rgba(37,99,235,0.06); color: #2563eb; }
    .nav-link.active { background: #2563eb; color: white; box-shadow: 0 4px 10px rgba(37,99,235,0.2); }
    .nav-link i { margin-right: 6px; }
    .container-card { max-width: 1400px; background: white; border-radius: 32px; padding: 2rem; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); }
    .section-title { font-weight: 650; font-size: 1.75rem; border-left: 6px solid #2563eb; padding-left: 1.2rem; margin-bottom: 1.8rem; }
    .slider-container { position: relative; display: flex; align-items: center; gap: 8px; }
    .slider-wrapper { overflow-x: hidden; scroll-behavior: smooth; flex: 1; -ms-overflow-style: none; scrollbar-width: none; }
    .slider-wrapper::-webkit-scrollbar { display: none; }
    .slider-track { display: flex; gap: 16px; }
    .slider-item { flex: 0 0 auto; }
    .galeri-item { width: 200px; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: white; }
    .galeri-item img { width: 100%; height: 180px; object-fit: cover; cursor: pointer; border-radius: 16px 16px 0 0; }
    .video-item { width: 300px; }
    .video-item .card { width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; border-radius: 16px; overflow: hidden; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .slider-btn { background: white; border: 1px solid #dee2e6; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s; }
    .slider-btn:hover:not(:disabled) { background: #f8f9fa; transform: scale(1.05); }
    .slider-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .timeline-item { position: relative; padding-left: 30px; margin-bottom: 25px; border-left: 2px solid #e2e8f0; }
    .timeline-item::before { content: ''; position: absolute; left: -9px; top: 8px; width: 16px; height: 16px; border-radius: 50%; background: #2563eb; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); z-index: 1; }
    .timeline-item:last-child { border-left: 2px solid transparent; }
    .timeline-item .timeline-date { display: inline-block; background: #eef2ff; color: #2563eb; font-weight: 600; padding: 4px 12px; border-radius: 30px; font-size: 0.85rem; margin-bottom: 8px; }
    .timeline-item h6 { font-weight: 700; margin-bottom: 4px; color: #0f172a; }
    .timeline-item p { margin-bottom: 4px; color: #334155; }
    #flyerCarousel { max-width: 900px; margin: 0 auto; }
    .carousel-item img { max-height: 500px; object-fit: contain; background-color: #f8fafc; cursor: pointer; }
    .carousel-caption { background: rgba(0,0,0,0.6); border-radius: 30px; padding: 8px 16px; bottom: 20px; }
    .footer-modern { font-size: 0.85rem; color: #64748b; margin-top: 3rem; text-align: center; padding: 1.5rem 0; border-top: 1px solid #e2e8f0; background: white; }
    .skeleton-loader { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-shimmer 1.5s infinite linear; border-radius: 8px; height: 1.2em; width: 100%; }
    @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">

    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor">

<!-- Konten utama -->
<div class="container container-card">
  <h2 class="section-title mb-4"><i class="bi bi-info-circle me-2"></i>Informasi PKD</h2>
  
  <!-- FLYER -->
  <div id="flyerSection" class="mb-5 text-center"></div>

  <!-- GALERI -->
  <div id="galeriSection" class="mb-5">
    <h4 class="fw-bold mb-3">📸 Galeri Kegiatan</h4>
    <div class="slider-container" id="galeriSliderContainer" style="display: none;">
      <button class="slider-btn prev" id="galeriPrev" disabled><i class="bi bi-chevron-left"></i></button>
      <div class="slider-wrapper" id="galeriWrapper">
        <div class="slider-track" id="galeriTrack"></div>
      </div>
      <button class="slider-btn next" id="galeriNext"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="galeriEmptyMessage" class="text-muted">Belum ada foto galeri.</div>
  </div>

  <!-- VIDEO -->
  <div id="videoSection" class="mb-5">
    <h4 class="fw-bold mb-3">🎥 Video Terkait</h4>
    <div class="slider-container" id="videoSliderContainer" style="display: none;">
      <button class="slider-btn prev" id="videoPrev" disabled><i class="bi bi-chevron-left"></i></button>
      <div class="slider-wrapper" id="videoWrapper">
        <div class="slider-track" id="videoTrack"></div>
      </div>
      <button class="slider-btn next" id="videoNext"><i class="bi bi-chevron-right"></i></button>
    </div>
    <div id="videoEmptyMessage" class="text-muted">Belum ada video.</div>
  </div>

  <!-- TIMELINE -->
  <div id="timelineSection">
    <h4 class="fw-bold mb-3">📅 Timeline Pelaksanaan</h4>
    <div id="timelineList"></div>
  </div>
</div>

<!-- Footer -->
<footer class="footer-modern container">
  <div class="d-flex justify-content-center align-items-center gap-2">
    <i class="bi bi-c-circle"></i>
    <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // =====================================================
  // KONFIGURASI - GANTI DENGAN URL APPS SCRIPT ANDA
  // =====================================================
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbw9SOqv7cUwaASY63dDAR2uGSDvEVMDOeH2WKEOpGYBsfvn2mS_kuk9Nwn-iXqXIkOa/exec'; // GANTI!

  // =====================================================
  // FUNGSI JSONP
  // =====================================================
  function callAppsScript(params) {
    return new Promise((resolve, reject) => {
      const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
      window[callbackName] = function(data) {
        delete window[callbackName];
        document.head.removeChild(script);
        resolve(data);
      };
      const query = new URLSearchParams({ ...params, callback: callbackName }).toString();
      const script = document.createElement('script');
      script.src = `${scriptUrl}?${query}`;
      script.onerror = (e) => {
        delete window[callbackName];
        document.head.removeChild(script);
        reject(new Error('JSONP request failed'));
      };
      document.head.appendChild(script);
    });
  }

  // =====================================================
  // FUNGSI BANTU
  // =====================================================
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return String(unsafe).replace(/[&<>"]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      if (m === '"') return '&quot;';
      return m;
    });
  }

  function getDriveImageUrl(fileId) {
    if (!fileId) return '';
    return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
  }

  function getYouTubeEmbedUrl(url) {
    if (!url) return null;
    url = url.trim();
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
      /^([a-zA-Z0-9_-]{11})$/
    ];
    for (let pattern of patterns) {
      const match = url.match(pattern);
      if (match && match[1] && match[1].length === 11) {
        return `https://www.youtube.com/embed/${match[1]}`;
      }
    }
    try {
      const urlObj = new URL(url);
      if (urlObj.hostname.includes('youtube.com') || urlObj.hostname.includes('youtu.be')) {
        let videoId = null;
        if (urlObj.hostname === 'youtu.be') videoId = urlObj.pathname.slice(1);
        else if (urlObj.pathname === '/watch') videoId = urlObj.searchParams.get('v');
        else if (urlObj.pathname.startsWith('/embed/')) videoId = urlObj.pathname.split('/')[2];
        else if (urlObj.pathname.startsWith('/v/')) videoId = urlObj.pathname.split('/')[2];
        if (videoId && videoId.length === 11) return `https://www.youtube.com/embed/${videoId}`;
      }
    } catch (e) {}
    return null;
  }

  function setupSlider(wrapperId, trackId, prevId, nextId, itemWidth) {
    const wrapper = document.getElementById(wrapperId);
    const track = document.getElementById(trackId);
    const prevBtn = document.getElementById(prevId);
    const nextBtn = document.getElementById(nextId);
    if (!wrapper || !track || !prevBtn || !nextBtn) return;
    const gap = 16;
    function updateButtons() {
      const maxScroll = track.scrollWidth - wrapper.clientWidth;
      prevBtn.disabled = wrapper.scrollLeft <= 0;
      nextBtn.disabled = wrapper.scrollLeft >= maxScroll - 1;
    }
    wrapper.addEventListener('scroll', updateButtons);
    window.addEventListener('resize', updateButtons);
    prevBtn.addEventListener('click', () => {
      wrapper.scrollBy({ left: - (itemWidth + gap), behavior: 'smooth' });
    });
    nextBtn.addEventListener('click', () => {
      wrapper.scrollBy({ left: itemWidth + gap, behavior: 'smooth' });
    });
    updateButtons();
  }

  // =====================================================
  // DATA MANUAL (FALLBACK)
  // =====================================================
  const manualVideos = [
    { judul: 'MARS SYUBBANUL WATHON', deskripsi: 'Mars Syubbanul Wathon - GP Ansor', url: 'https://youtu.be/q-jLfOBVxrw' },
    { judul: 'Mars GP Ansor', deskripsi: 'Mars Gerakan Pemuda Ansor', url: 'https://youtu.be/x_HcLf8RFP4' },
    { judul: 'Indonesia Raya', deskripsi: 'Lagu Kebangsaan Indonesia Raya', url: 'https://youtu.be/DhyDhaCynGw' }
  ];

  // Flyer manual (ganti FILE_ID dengan ID file Google Drive yang benar)
  const manualFlyers = [
    { judul: 'Flyer PKD 1', deskripsi: 'Informasi PKD Gelombang 1', url: 'https://drive.google.com/uc?id=FILE_ID_1' },
    { judul: 'Flyer PKD 2', deskripsi: 'Informasi PKD Gelombang 2', url: 'https://drive.google.com/uc?id=FILE_ID_2' }
  ];

  // =====================================================
  // RENDER FUNCTIONS
  // =====================================================
  function renderFlyer(items) {
    const flyerItems = items.filter(i => i.jenis === 'flyer').sort((a,b) => (a.urutan||0)-(b.urutan||0));
    const flyerDiv = document.getElementById('flyerSection');
    if (flyerItems.length > 1) {
      let carouselHtml = `
        <div id="flyerCarousel" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-indicators">
      `;
      flyerItems.forEach((item, index) => {
        carouselHtml += `<button type="button" data-bs-target="#flyerCarousel" data-bs-slide-to="${index}" class="${index === 0 ? 'active' : ''}" aria-label="Slide ${index+1}"></button>`;
      });
      carouselHtml += `</div><div class="carousel-inner">`;
      flyerItems.forEach((item, index) => {
        let imgUrl = item.url;
        if (imgUrl && !imgUrl.startsWith('http')) {
          imgUrl = getDriveImageUrl(imgUrl);
        }
        carouselHtml += `
          <div class="carousel-item ${index === 0 ? 'active' : ''}">
            <img src="${imgUrl}" class="d-block w-100" alt="${escapeHtml(item.judul)}" onclick="window.open('${imgUrl}', '_blank')">
            <div class="carousel-caption d-none d-md-block">
              <h5>${escapeHtml(item.judul)}</h5>
              <p>${escapeHtml(item.deskripsi)}</p>
            </div>
          </div>
        `;
      });
      carouselHtml += `
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#flyerCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#flyerCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      `;
      flyerDiv.innerHTML = carouselHtml;
    } else if (flyerItems.length === 1) {
      const flyer = flyerItems[0];
      let imgUrl = flyer.url;
      if (imgUrl && !imgUrl.startsWith('http')) {
        imgUrl = getDriveImageUrl(imgUrl);
      }
      flyerDiv.innerHTML = `<img src="${imgUrl}" class="img-fluid rounded shadow" alt="Flyer" style="max-height: 500px;" onclick="window.open('${imgUrl}', '_blank')">`;
    } else {
      flyerDiv.innerHTML = '';
    }
  }

  function renderGaleri(items) {
    const galeri = items.filter(i => i.jenis === 'galeri').sort((a,b) => (a.urutan||0)-(b.urutan||0));
    const track = document.getElementById('galeriTrack');
    const container = document.getElementById('galeriSliderContainer');
    const emptyMsg = document.getElementById('galeriEmptyMessage');
    if (galeri.length) {
      container.style.display = 'flex';
      emptyMsg.style.display = 'none';
      track.innerHTML = galeri.map(g => {
        let imgUrl = g.url;
        if (imgUrl && !imgUrl.startsWith('http')) {
          imgUrl = getDriveImageUrl(imgUrl);
        }
        return `
          <div class="slider-item galeri-item">
            <img src="${imgUrl}" alt="${escapeHtml(g.judul)}" onclick="window.open('${imgUrl}', '_blank')">
            <div class="p-2"><small>${escapeHtml(g.judul)}</small></div>
          </div>
        `;
      }).join('');
      setupSlider('galeriWrapper', 'galeriTrack', 'galeriPrev', 'galeriNext', 200);
    } else {
      container.style.display = 'none';
      emptyMsg.style.display = 'block';
    }
  }

  function renderVideo(items) {
    const videos = items.filter(i => i.jenis === 'video').sort((a,b) => (a.urutan||0)-(b.urutan||0));
    const track = document.getElementById('videoTrack');
    const container = document.getElementById('videoSliderContainer');
    const emptyMsg = document.getElementById('videoEmptyMessage');
    if (videos.length) {
      container.style.display = 'flex';
      emptyMsg.style.display = 'none';
      track.innerHTML = videos.map(v => {
        const embedUrl = getYouTubeEmbedUrl(v.url);
        return `
          <div class="slider-item video-item">
            <div class="card h-100 shadow-sm">
              <div class="video-wrapper">
                ${embedUrl ? `<iframe src="${embedUrl}" allowfullscreen title="${escapeHtml(v.judul)}"></iframe>` : '<div class="d-flex align-items-center justify-content-center h-100 bg-light text-danger">URL tidak valid</div>'}
              </div>
              <div class="card-body">
                <h6 class="card-title">${escapeHtml(v.judul)}</h6>
                <p class="card-text small">${escapeHtml(v.deskripsi)}</p>
              </div>
            </div>
          </div>
        `;
      }).join('');
      setupSlider('videoWrapper', 'videoTrack', 'videoPrev', 'videoNext', 300);
    } else {
      container.style.display = 'none';
      emptyMsg.style.display = 'block';
    }
  }

  function renderTimeline(items) {
    const timeline = items.filter(i => i.jenis === 'timeline').sort((a,b) => (a.urutan||0)-(b.urutan||0));
    const list = document.getElementById('timelineList');
    if (timeline.length) {
      list.innerHTML = timeline.map(t => {
        let tanggal = '';
        if (t.url) {
          const d = new Date(t.url);
          tanggal = !isNaN(d.getTime()) ? d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) : t.url;
        }
        return `
          <div class="timeline-item">
            ${tanggal ? `<span class="timeline-date"><i class="bi bi-calendar-event me-1"></i>${escapeHtml(tanggal)}</span>` : ''}
            <h6 class="fw-bold">${escapeHtml(t.judul)}</h6>
            <p class="mb-1">${escapeHtml(t.deskripsi)}</p>
          </div>
        `;
      }).join('');
    } else {
      list.innerHTML = '';
    }
  }

  // =====================================================
  // LOAD DATA
  // =====================================================
  window.onload = async function() {
    // Tampilkan skeleton loader
    document.getElementById('flyerSection').innerHTML = '<div class="skeleton-loader" style="height:300px;"></div>';
    document.getElementById('galeriEmptyMessage').innerText = 'Memuat galeri...';
    document.getElementById('videoEmptyMessage').innerText = 'Memuat video...';
    document.getElementById('timelineList').innerHTML = '<div class="skeleton-loader" style="height:100px;"></div>';

    try {
      const res = await callAppsScript({ action: 'getInfoList' });
      if (!res.success) throw new Error(res.error || 'Gagal memuat data');
      let items = res.data || [];

      // Tambahkan video manual agar selalu ada
      const manualItems = manualVideos.map(v => ({ ...v, jenis: 'video' }));
      items = items.concat(manualItems);

      renderFlyer(items);
      renderGaleri(items);
      renderVideo(items);
      renderTimeline(items);
    } catch (e) {
      console.warn('Gagal memuat data dari server, menggunakan data manual.', e);
      // Fallback ke data manual
      const manualItems = [
        ...manualVideos.map(v => ({ ...v, jenis: 'video' })),
        ...manualFlyers.map(f => ({ ...f, jenis: 'flyer' }))
      ];
      renderFlyer(manualItems);
      renderGaleri([]); // kosong
      renderVideo(manualItems);
      renderTimeline([]); // kosong

      // Tampilkan notifikasi
      const alertDiv = document.createElement('div');
      alertDiv.className = 'alert alert-info mt-3';
      alertDiv.innerHTML = '<i class="bi bi-info-circle"></i> Data server tidak dapat dimuat. Menampilkan konten default.';
      document.querySelector('.container-card').prepend(alertDiv);
    }
  };
</script>
</body>
