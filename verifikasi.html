<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Verifikasi Sertifikat - PKD GP Ansor Bantul</title>

  <!-- Favicon & Font Modern -->
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Html5-Qrcode untuk scan QR -->
  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <script>
    // Fallback jika library dari unpkg gagal
    window.onerror = function(msg, url, line, col, error) {
      if (msg.includes('Html5QrcodeScanner') || (error && error.message && error.message.includes('Html5QrcodeScanner'))) {
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/html5-qrcode@2.2.1/minified/html5-qrcode.min.js';
        document.head.appendChild(script);
      }
    };
    if (typeof Html5QrcodeScanner === 'undefined') {
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html5-qrcode@2.2.1/minified/html5-qrcode.min.js';
      document.head.appendChild(script);
    }
  </script>

  <style>
    * {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      background: rgba(255,255,255,0.8) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(203,213,225,0.3);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .navbar-brand {
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #0f172a !important;
    }
    .navbar-brand img {
      height: 40px;
      width: auto;
      margin-right: 10px;
    }
    .brand-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0a3d62;
    }
    .brand-sub {
      font-size: 0.8rem;
      font-weight: 400;
      color: #6c757d;
      display: block;
      margin-top: 2px;
    }
    .container-card {
      max-width: 900px;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      margin: 30px auto;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      border: 1px solid rgba(226,232,240,0.6);
      flex: 1;
    }
    .section-title {
      font-weight: 650;
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
      color: #0f172a;
      border-left: 6px solid #2563eb;
      padding-left: 1.2rem;
    }
    #qr-reader {
      width: 100%;
      border: 2px dashed #cbd5e1;
      border-radius: 24px;
      padding: 16px;
      background: #f1f5f9;
    }
    #qr-reader video {
      border-radius: 16px;
    }
    .footer-modern {
      font-size: 0.85rem;
      color: #64748b;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #e2e8f0;
      background: white;
      margin-top: auto;
    }
    .btn-rounded {
      border-radius: 9999px;
      padding: 0.6rem 2rem;
      font-weight: 600;
    }
    /* Animasi ringan */
    .container-card {
      animation: fadeInUp 0.5s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Spinner */
    #loadingSpinner {
      display: none;
    }
    .loading-spinner {
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid rgba(37,99,235,0.2);
      border-radius: 50%;
      border-top-color: #2563eb;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .verification-result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background-color: #f8f9fa;
      border-left: 4px solid #2563eb;
    }
    .verification-valid {
      border-left-color: #28a745;
      background-color: #d4edda;
    }
    .verification-invalid {
      border-left-color: #dc3545;
      background-color: #f8d7da;
    }
  </style>
</head>
<body>

<!-- Navbar sederhana -->
<nav class="navbar navbar-expand navbar-light bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor">
      <span>
        <span class="brand-title">PKD GP Ansor</span>
        <span class="brand-sub">Kabupaten Bantul</span>
      </span>
    </a>
    <div class="ms-auto">
      <a href="index.html" class="btn btn-outline-primary rounded-pill px-4">
        <i class="bi bi-house-door me-1"></i>Beranda
      </a>
    </div>
  </div>
</nav>

<!-- Konten Utama -->
<div class="container container-card">
  <h2 class="section-title">
    <i class="bi bi-qr-code-scan me-2"></i>Verifikasi Keaslian Sertifikat
  </h2>

  <!-- Input manual nomor sertifikat -->
  <div class="mb-4">
    <label class="form-label fw-semibold">Masukkan Nomor Sertifikat</label>
    <div class="input-group">
      <input type="text" class="form-control form-control-lg" id="certNumberInput" placeholder="Contoh: 001/PC-XI/SR-01.PKD/I/2026">
      <button class="btn btn-primary btn-lg" type="button" id="verifyByNumberBtn">
        <i class="bi bi-search"></i> Cek
      </button>
    </div>
  </div>

  <div class="text-center my-4 text-muted fw-semibold">— atau —</div>

  <!-- Area scan QR -->
  <div class="mb-4">
    <label class="form-label fw-semibold">Scan QR Code pada Sertifikat</label>
    <div id="qr-reader"></div>
    <div id="qr-reader-results" class="mt-2 small text-muted"></div>
  </div>

  <!-- Indikator proses -->
  <div id="loadingSpinner" class="text-center my-3">
    <div class="loading-spinner" role="status">
      <span class="visually-hidden">Memverifikasi...</span>
    </div>
    <p class="mt-2">Memverifikasi sertifikat, harap tunggu...</p>
  </div>

  <!-- Hasil verifikasi -->
  <div id="verifyResult" class="mt-4" style="display: none;"></div>

  <div class="text-center mt-3">
    <a href="index.html" class="btn btn-outline-secondary rounded-pill px-5">
      <i class="bi bi-arrow-left me-1"></i>Kembali
    </a>
  </div>
</div>

<!-- Footer -->
<footer class="footer-modern">
  <div class="container">
    <i class="bi bi-c-circle"></i> Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script Verifikasi -->
<script>
  // Konfigurasi Apps Script (sama dengan di index.html)
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbw9SOqv7cUwaASY63dDAR2uGSDvEVMDOeH2WKEOpGYBsfvn2mS_kuk9Nwn-iXqXIkOa/exec'; // Ganti jika perlu
  const BASE_URL = 'https://pkd-ansorbantul.github.io'; // Ganti dengan domain sebenarnya

  // Utility: escape HTML
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  // Fungsi call Apps Script (dengan fallback JSONP)
  async function callAppsScript(params, method = 'GET', timeout = 30000) {
    return new Promise(async (resolve, reject) => {
      const queryString = new URLSearchParams(params).toString();
      if (method === 'GET') {
        try {
          const res = await fetch(`${scriptUrl}?${queryString}`, { method: 'GET', mode: 'cors' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          resolve(data);
        } catch (fetchError) {
          console.warn('Fetch gagal, fallback JSONP:', fetchError);
          // Fallback JSONP sederhana
          const callbackName = 'jsonp_callback_' + Date.now();
          const script = document.createElement('script');
          let isResolved = false;
          const timer = setTimeout(() => {
            if (!isResolved) {
              isResolved = true;
              document.head.removeChild(script);
              delete window[callbackName];
              reject(new Error('Timeout JSONP'));
            }
          }, timeout);

          window[callbackName] = function(data) {
            if (!isResolved) {
              isResolved = true;
              clearTimeout(timer);
              resolve(data || {});
            }
            delete window[callbackName];
            document.head.removeChild(script);
          };

          script.onerror = () => {
            if (!isResolved) {
              isResolved = true;
              clearTimeout(timer);
              delete window[callbackName];
              reject(new Error('Gagal memuat JSONP'));
            }
          };

          const cleanParams = { ...params };
          delete cleanParams.tandaTangan;
          delete cleanParams.signature;
          script.src = `${scriptUrl}?${new URLSearchParams({ ...cleanParams, callback: callbackName }).toString()}`;
          document.head.appendChild(script);
        }
      } else {
        // POST no-cors (tidak digunakan di halaman ini, tapi tetap ada)
        fetch(scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(params)
        }).then(() => resolve({ success: true })).catch(reject);
      }
    });
  }

  // Tampilkan hasil verifikasi
  function showResult(content, isValid = true) {
    const resultDiv = document.getElementById('verifyResult');
    const spinner = document.getElementById('loadingSpinner');
    spinner.style.display = 'none';
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = content;
    // Scroll ke hasil
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Simpan hasil ke sessionStorage agar tidak perlu request ulang
  function cacheResult(nomor, data) {
    try {
      const cache = {
        data: data,
        timestamp: Date.now()
      };
      sessionStorage.setItem('verify_' + nomor, JSON.stringify(cache));
    } catch (e) {}
  }

  function getCachedResult(nomor) {
    try {
      const cached = sessionStorage.getItem('verify_' + nomor);
      if (cached) {
        const parsed = JSON.parse(cached);
        // Cache berlaku 1 jam
        if (Date.now() - parsed.timestamp < 3600000) {
          return parsed.data;
        }
      }
    } catch (e) {}
    return null;
  }

  // Verifikasi sertifikat berdasarkan nomor
  async function verifyCertificate(nomor) {
    const resultDiv = document.getElementById('verifyResult');
    const spinner = document.getElementById('loadingSpinner');
    // Sembunyikan hasil sebelumnya, tampilkan spinner
    resultDiv.style.display = 'none';
    spinner.style.display = 'block';

    const cleanedNomor = nomor ? nomor.toString().trim().replace(/\s+/g, ' ') : '';
    if (!cleanedNomor) {
      spinner.style.display = 'none';
      showResult('<div class="alert alert-danger mb-0">Masukkan nomor sertifikat terlebih dahulu.</div>', false);
      return;
    }

    // Cek cache
    const cached = getCachedResult(cleanedNomor);
    if (cached) {
      spinner.style.display = 'none';
      renderVerificationResult(cached);
      return;
    }

    try {
      const res = await callAppsScript({ action: 'verifyCertificate', nomor: cleanedNomor }, 'GET');
      spinner.style.display = 'none';
      if (res.success && res.data) {
        cacheResult(cleanedNomor, res.data);
        renderVerificationResult(res.data);
      } else {
        showResult(`<div class="alert alert-danger mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>Sertifikat dengan nomor "${escapeHtml(cleanedNomor)}" tidak ditemukan.</div>`, false);
      }
    } catch (e) {
      spinner.style.display = 'none';
      showResult(`<div class="alert alert-danger mb-0">Gagal memverifikasi: ${escapeHtml(e.message)}</div>`, false);
    }
  }

  function renderVerificationResult(data) {
    const html = `
      <div class="verification-result verification-valid">
        <h5 class="alert-heading fw-bold"><i class="bi bi-check-circle-fill me-2"></i>Sertifikat VALID</h5>
        <hr>
        <p class="mb-1"><strong>Nama:</strong> ${escapeHtml(data.nama_peserta)}</p>
        <p class="mb-1"><strong>Nomor Sertifikat:</strong> ${escapeHtml(data.nomor_sertifikat)}</p>
        <p class="mb-1"><strong>Lokasi PKD:</strong> ${escapeHtml(data.lokasi || 'Kabupaten Bantul')}</p>
        <p class="mb-1"><strong>Tanggal Terbit:</strong> ${escapeHtml(data.createdAt || '-')}</p>
        <a href="${escapeHtml(data.pdf_url)}" target="_blank" class="btn btn-sm btn-outline-success mt-2 rounded-pill">
          <i class="bi bi-file-pdf"></i> Lihat Sertifikat
        </a>
      </div>
    `;
    showResult(html, true);
  }

  // Ambil parameter dari URL
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  // Inisialisasi QR scanner
  let html5QrcodeScanner = null;

  function initQrScanner() {
    if (typeof Html5QrcodeScanner === 'undefined') {
      document.getElementById('qr-reader').innerHTML = '<div class="alert alert-warning">Gagal memuat library QR. Silakan refresh atau gunakan input manual.</div>';
      return;
    }
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear();
    }
    html5QrcodeScanner = new Html5QrcodeScanner(
      "qr-reader",
      { fps: 10, qrbox: { width: 250, height: 250 } },
      /* verbose= */ false
    );
    html5QrcodeScanner.render(onScanSuccess, onScanError);
  }

  function onScanSuccess(decodedText) {
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear();
    }

    // Ambil teks hasil scan
    let nomor = decodedText.trim();

    // Coba ekstrak nomor jika formatnya "Sertifikat No: ... - ..."
    const prefix = "Sertifikat No: ";
    if (nomor.startsWith(prefix)) {
      const afterPrefix = nomor.substring(prefix.length);
      const dashIndex = afterPrefix.indexOf(" - ");
      if (dashIndex !== -1) {
        nomor = afterPrefix.substring(0, dashIndex).trim();
      } else {
        nomor = afterPrefix.trim();
      }
    } else if (nomor.includes('?nomor=')) {
      // Jika QR berisi URL dengan parameter (metode baru)
      try {
        const url = new URL(nomor);
        const paramNomor = url.searchParams.get('nomor');
        if (paramNomor) nomor = paramNomor;
      } catch (e) {
        // bukan URL valid, gunakan teks asli
      }
    }

    // Isi input dengan nomor (opsional)
    document.getElementById('certNumberInput').value = nomor;
    // Jalankan verifikasi
    verifyCertificate(nomor);
  }

  function onScanError(errorMessage) {
    // Abaikan, biasanya kamera masih mencari
    console.log(errorMessage);
  }

  // Event listener tombol cek manual
  document.getElementById('verifyByNumberBtn').addEventListener('click', function() {
    const nomor = document.getElementById('certNumberInput').value;
    verifyCertificate(nomor);
  });

  // Enter di input juga memicu verifikasi
  document.getElementById('certNumberInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('verifyByNumberBtn').click();
    }
  });

  // Saat halaman dimuat, cek parameter 'nomor' dan inisialisasi scanner
  window.addEventListener('load', function() {
    const nomorFromUrl = getQueryParam('nomor');
    if (nomorFromUrl) {
      document.getElementById('certNumberInput').value = nomorFromUrl;
      // Langsung verifikasi dengan spinner
      verifyCertificate(nomorFromUrl);
    }
    initQrScanner();
  });

  // Bersihkan scanner saat pindah halaman (opsional)
  window.addEventListener('beforeunload', function() {
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear();
    }
  });
</script>
</body>
</html>
