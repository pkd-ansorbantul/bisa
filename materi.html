<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>PKD GP Ansor Kabupaten Bantul · Materi</title>

  <!-- Favicon & Font Modern -->
  <link rel="icon" type="image/png" href="LOGO ANSOR.webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    /* Gaya asli dipertahankan */
    * { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    /* ===== Gaya navbar yang diselaraskan dengan index.html ===== */
    .navbar-brand {
      line-height: 1.2;
    }
    .brand-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #0a3d62;
    }
    .brand-sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6c757d;
      display: block;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    .navbar-brand img {
      height: 45px;
      width: auto;
      margin-right: 12px;
      transition: transform 0.3s ease;
      will-change: transform;
    }
    .navbar-brand img:hover {
      transform: scale(1.05);
    }
    /* ========================================================= */
    body {
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
    }
    .container-card {
      max-width: 1000px;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      margin: 30px auto;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      border: 1px solid rgba(226,232,240,0.6);
    }
    .section-title {
      font-weight: 650;
      font-size: 1.75rem;
      margin-bottom: 1.8rem;
      color: #0f172a;
      border-left: 6px solid #2563eb;
      padding-left: 1.2rem;
    }
    .footer-modern {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 3rem;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #e2e8f0;
      background: white;
    }
    .preview-materi-btn {
      transition: all 0.2s;
    }
    .preview-materi-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 14px rgba(37,99,235,0.25);
    }
    #previewMateriModal .modal-content {
      background: #0f172a;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .toast {
      background: white;
      border-left: 5px solid;
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
      border-radius: 16px;
    }
    .toast.border-success { border-left-color: #28a745; }
    .toast.border-danger { border-left-color: #dc3545; }
  </style>
</head>
<body>

<!-- Navbar (sama dengan about.html) -->
<nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="LOGO ANSOR.webp" alt="GP Ansor" class="me-2">
      <span>
        <span class="brand-title">PKD GP Ansor</span>
        <span class="brand-sub">Kabupaten Bantul</span>
      </span>
    </a>
    <a href="index.html" class="btn btn-outline-primary rounded-pill px-4 ms-auto">
      <i class="bi bi-arrow-left"></i> Kembali
    </a>
  </div>
</nav>

<!-- Konten utama -->
<div id="contentArea">
  <section id="materiSection" class="container container-card">
    <h2 class="section-title"><i class="bi bi-journal-bookmark-fill me-2"></i>Materi Pelatihan</h2>
    <div id="materiContainer">Memuat daftar materi...</div>
  </section>
</div>

<!-- Footer -->
<footer class="footer-modern container">
  <div class="d-flex justify-content-center align-items-center gap-2">
    <i class="bi bi-c-circle"></i>
    <span>Hak Cipta 2026 - Tim Instruktur GP Ansor Kabupaten Bantul. Semua Hak Dilindungi</span>
  </div>
</footer>

<!-- Modal preview materi -->
<div class="modal fade" id="previewMateriModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="background: #1e1e2f; border-radius: 20px;">
      <div class="modal-header bg-dark text-white border-0 rounded-top-4">
        <h5 class="modal-title" id="previewMateriLabel">
          <i class="bi bi-file-earmark-play me-2"></i><span id="previewMateriJudul">Pratinjau Materi</span>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0 d-flex justify-content-center align-items-center" style="min-height: 70vh; background: #0f172a; border-radius: 0 0 20px 20px; position: relative;">
        <div id="previewMateriSpinner" class="position-absolute top-50 start-50 translate-middle">
          <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Memuat...</span>
          </div>
        </div>
        <iframe id="previewMateriIframe" src="" style="width: 100%; height: 80vh; border: none; border-radius: 0 0 20px 20px;" allowfullscreen onload="document.getElementById('previewMateriSpinner').style.display='none';"></iframe>
      </div>
      <div class="modal-footer border-0 bg-dark rounded-bottom-4">
        <button type="button" class="btn btn-outline-light rounded-pill px-4" data-bs-dismiss="modal">Tutup</button>
        <a id="previewMateriDownloadBtn" href="#" target="_blank" class="btn btn-primary rounded-pill px-4">
          <i class="bi bi-download me-1"></i>Unduh
        </a>
      </div>
    </div>
  </div>
</div>

<!-- Toast notifikasi -->
<div class="toast-container">
  <div id="notificationToast" class="toast border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
    <div class="toast-header bg-white border-0">
      <i class="bi me-2" id="toastIcon"></i>
      <strong class="me-auto" id="toastTitle">Berhasil</strong>
      <small>baru saja</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toastMessage"></div>
  </div>
</div>

<!-- Bootstrap JS & dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script publik (tanpa admin) -->
<script>
  // =====================================================
  //   KONFIGURASI & STATE
  // =====================================================
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbzCgdl1FM1Ji4PbTFS3EwMCRqUxTqvwPf_AOrWBRHKyal4MhgUCd5A3xILjqfW7PCpY/exec'; // GANTI DENGAN URL DEPLOY ANDA!
  const CACHE_DURATION = 3600000; // 1 jam

  // Cache per jenis data
  const dataCache = {
    materiList: { data: null, lastFetch: 0 }
  };

  // =====================================================
  //   FUNGSI BANTU
  // =====================================================
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function showToast(message, type = 'success') {
    const toastEl = document.getElementById('notificationToast');
    const toastMessage = document.getElementById('toastMessage');
    const toastIcon = document.getElementById('toastIcon');
    const toastTitle = document.getElementById('toastTitle');

    toastMessage.innerText = message;

    if (type === 'success') {
      toastEl.classList.add('border-success');
      toastEl.classList.remove('border-danger');
      toastIcon.className = 'bi bi-check-circle-fill me-2 text-success';
      toastTitle.innerText = 'Berhasil';
      toastTitle.style.color = '#28a745';
    } else {
      toastEl.classList.add('border-danger');
      toastEl.classList.remove('border-success');
      toastIcon.className = 'bi bi-x-circle-fill me-2 text-danger';
      toastTitle.innerText = 'Gagal';
      toastTitle.style.color = '#dc3545';
    }

    const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
    toast.show();
  }

  // =====================================================
  //   PANGGILAN APPS SCRIPT (GET & POST)
  // =====================================================
  function callAppsScript(params, method = 'POST', timeout = 10000) {
    return new Promise(async (resolve, reject) => {
      if (method === 'GET') {
        try {
          const queryString = new URLSearchParams(params).toString();
          const response = await fetch(`${scriptUrl}?${queryString}`, {
            method: 'GET',
            mode: 'cors',
            headers: { 'Accept': 'application/json' }
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          return resolve(data);
        } catch (fetchError) {
          console.warn('Fetch GET gagal, fallback ke JSONP:', fetchError);
          const callbackName = 'jsonp_callback_' + Date.now();
          const script = document.createElement('script');
          let isResolved = false;
          let timer = setTimeout(() => {
            if (!isResolved) {
              isResolved = true;
              if (document.head.contains(script)) document.head.removeChild(script);
              delete window[callbackName];
              reject(new Error('⏱️ Timeout: Server tidak merespon JSONP.'));
            }
          }, timeout);

          window[callbackName] = function(data) {
            if (!isResolved) {
              isResolved = true;
              clearTimeout(timer);
              resolve(data || {});
            }
            delete window[callbackName];
            if (document.head.contains(script)) document.head.removeChild(script);
          };

          script.onerror = () => {
            if (!isResolved) {
              isResolved = true;
              clearTimeout(timer);
              delete window[callbackName];
              if (document.head.contains(script)) document.head.removeChild(script);
              reject(new Error('❌ Gagal memuat script JSONP.'));
            }
          };

          const cleanParams = { ...params };
          delete cleanParams.tandaTangan;
          delete cleanParams.signature;
          const queryString = new URLSearchParams({ ...cleanParams, callback: callbackName }).toString();
          script.src = `${scriptUrl}?${queryString}`;
          document.head.appendChild(script);
        }
      } else {
        fetch(scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(params)
        })
          .then(() => resolve({ success: true, message: 'Request sent (no-cors)' }))
          .catch(reject);
      }
    });
  }

  // =====================================================
  //   AMBIL DATA MATERI (dengan cache)
  // =====================================================
  async function fetchMateriList(forceRefresh = false) {
    const cache = dataCache.materiList;
    const now = Date.now();
    if (!forceRefresh && cache.data && (now - cache.lastFetch) < CACHE_DURATION) {
      return cache.data;
    }
    try {
      const res = await callAppsScript({ action: 'getMateriList' }, 'GET', 10000);
      const data = res.data || [];
      cache.data = data;
      cache.lastFetch = now;
      return data;
    } catch (e) {
      console.error('Gagal memuat materi:', e);
      return cache.data || [];
    }
  }

  // =====================================================
  //   TAMPILKAN DAFTAR MATERI
  // =====================================================
  async function loadMateriList() {
    const container = document.getElementById('materiContainer');
    if (!container) return;
    container.innerHTML = 'Memuat materi...';

    try {
      const materi = await fetchMateriList();
      if (!materi.length) {
        container.innerHTML = '<div class="alert alert-info text-center">Belum ada materi yang diunggah.</div>';
        return;
      }

      let html = '<div class="row g-4">';
      materi.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(m => {
        const fileUrl = `https://drive.google.com/file/d/${m.fileId}/view`;
        const previewUrl = `https://drive.google.com/file/d/${m.fileId}/preview`;
        const icon = m.tipe === 'pdf' ? 'bi-file-pdf-fill text-danger' : 'bi-file-ppt-fill text-warning';
        
        html += `
          <div class="col-md-6">
            <div class="card h-100 border-0 shadow-sm rounded-4">
              <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                  <i class="${icon} fs-1 me-3"></i>
                  <h5 class="card-title mb-0">${escapeHtml(m.judul || '')}</h5>
                </div>
                <p class="card-text text-muted small">${escapeHtml(m.deskripsi || '')}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="badge bg-light text-dark">${m.tipe.toUpperCase()}</span>
                  <div>
                    <button class="btn btn-primary btn-sm rounded-pill px-3 me-1 preview-materi-btn" 
                      data-judul="${escapeHtml(m.judul)}" 
                      data-preview-url="${previewUrl}" 
                      data-download-url="${fileUrl}">
                      <i class="bi bi-play-circle me-1"></i>Tayangkan
                    </button>
                    <a href="${fileUrl}" target="_blank" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                      <i class="bi bi-download"></i>
                    </a>
                  </div>
                </div>
                <div class="mt-2 text-end text-muted small">
                  Diupload: ${new Date(m.timestamp).toLocaleDateString('id-ID')}
                </div>
              </div>
            </div>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;

      // Event listener untuk tombol preview
      document.querySelectorAll('.preview-materi-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const judul = this.dataset.judul;
          const previewUrl = this.dataset.previewUrl;
          const downloadUrl = this.dataset.downloadUrl;

          document.getElementById('previewMateriJudul').innerText = judul;
          document.getElementById('previewMateriIframe').src = previewUrl;
          document.getElementById('previewMateriDownloadBtn').href = downloadUrl;
          document.getElementById('previewMateriSpinner').style.display = 'flex';

          new bootstrap.Modal(document.getElementById('previewMateriModal')).show();
        });
      });

    } catch (e) {
      container.innerHTML = `<div class="alert alert-danger">Gagal memuat materi: ${escapeHtml(e.message)}</div>`;
    }
  }

  // =====================================================
  //   INISIALISASI
  // =====================================================
  window.onload = function() {
    loadMateriList();

    // Tutup navbar otomatis saat klik di luar
    document.addEventListener('click', function(event) {
      const navbar = document.getElementById('navbarMain');
      const toggler = document.querySelector('.navbar-toggler');
      if (!navbar || !toggler) return;
      const isClickInside = navbar.contains(event.target) || toggler.contains(event.target);
      if (!isClickInside && navbar.classList.contains('show')) {
        const bsCollapse = bootstrap.Collapse.getInstance(navbar);
        if (bsCollapse) bsCollapse.hide();
      }
    });

    // Reset iframe saat modal ditutup
    document.getElementById('previewMateriModal')?.addEventListener('hidden.bs.modal', function () {
      document.getElementById('previewMateriIframe').src = '';
      document.getElementById('previewMateriSpinner').style.display = 'flex';
    });
  };
</script>
</body>
</html>
